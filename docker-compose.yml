services:
  mc-forge:
    build:
      context: .
      args:
        # For 1.20.1 Forge, Java 17 is generally safe.
        # For 1.21.x, Java 21 is usually appropriate.
        JAVA_IMAGE: ${JAVA_IMAGE:-eclipse-temurin:17-jre-jammy}
    container_name: ${CONTAINER_NAME:-mc-forge}
    restart: unless-stopped

    ports:
      - "${MC_PORT:-25565}:25565"
      # RCON is intentionally not published to the host.
      # Use mcctl.sh / mcctl.ps1, which enters the container network namespace.
      # If you must expose it locally, prefer:
      # - "127.0.0.1:${RCON_PORT:-25575}:${RCON_PORT:-25575}"

    environment:
      EULA: ${EULA:-TRUE}
      JVM_XMS: ${JVM_XMS:-1G}
      JVM_XMX: ${JVM_XMX:-4G}
      JVM_ARGS: ${JVM_ARGS:--XX:+UseG1GC}
      ENABLE_RCON: ${ENABLE_RCON:-TRUE}
      RCON_PORT: ${RCON_PORT:-25575}
      RCON_PASSWORD: ${RCON_PASSWORD:-change-this-rcon-password}
      TZ: ${TZ:-Asia/Seoul}

    volumes:
      - ./data:/data

    mem_limit: ${MEM_LIMIT:-6g}
    stdin_open: true
    tty: true
